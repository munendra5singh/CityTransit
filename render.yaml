# Render Blueprint — lets you deploy the backend with one click via
# https://dashboard.render.com/blueprints (New + > Blueprint > pick this repo).
# Uses Render's free web service plan.
services:
  - type: web
    name: citytransit-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: citytransit
      - key: JWT_SECRET
        generateValue: true
      - key: ENV
        value: production
      - key: ALLOWED_ORIGINS
        sync: false
